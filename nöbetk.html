<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGA | TOTAL CONTROL V8</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CSS kısmını aynen korudum */
        :root {
            --bg: #030712; --panel: rgba(17, 24, 39, 0.8); --accent: #38bdf8;
            --success: #10b981; --danger: #ef4444; --text: #f3f4f6; --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); background-image: radial-gradient(circle at 50% -20%, #1e293b, transparent); height: 100vh; overflow: hidden; }
        .wrapper { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 80px 1fr; height: 100vh; }
        header { grid-column: 1 / -1; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 100; }
        aside { background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        main { padding: 25px; overflow-y: auto; }
        .manual-entry { background: rgba(56, 189, 248, 0.05); border: 1px solid var(--accent); padding: 20px; border-radius: 20px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; font-size: 13px; width: 100%; }
        input:focus { border-color: var(--accent); }
        .log-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 15px 20px; display: grid; grid-template-columns: 1.2fr 1.5fr 1.5fr 1fr 0.3fr; align-items: center; gap: 15px; margin-bottom: 10px; }
        .status-select { font-weight: 800; font-size: 11px; cursor: pointer; border: 1px solid transparent; text-align: center; appearance: none; padding: 8px; }
        .status-safe { background: rgba(16, 185, 129, 0.2) !important; color: var(--success) !important; border-color: var(--success) !important; }
        .status-alert { background: rgba(239, 68, 68, 0.2) !important; color: var(--danger) !important; border-color: var(--danger) !important; }
        .btn-add { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        #toast { position: fixed; top: 20px; right: 20px; background: var(--success); color: #000; padding: 12px 25px; border-radius: 10px; font-weight: 800; display: none; z-index: 2000; }
    </style>
</head>
<body>

<div id="toast">SİSTEM GÜNCELLENDİ ✓</div>

<div class="wrapper">
    <header>
        <div style="font-weight:900; font-size:24px;">CGA <span style="color:var(--accent)">SYSTEM</span> <span id="siteTag" style="font-size:10px; color:var(--success); border:1px solid; padding:2px 6px; border-radius:4px; margin-left:10px; vertical-align:middle;">CONNECTING...</span></div>
        <div id="clock" style="font-family:'JetBrains Mono'; font-weight:700;">00:00:00</div>
    </header>

    <aside>
        <div style="padding:15px; background:rgba(255,255,255,0.03); border-radius:12px; border:1px solid var(--border);">
            <div style="font-size:10px; color:var(--accent); font-weight:800;">TOPLAM NÖBET</div>
            <div id="totalCount" style="font-size:32px; font-weight:900;">0</div>
        </div>
    </aside>

    <main>
        <div class="manual-entry">
            <div class="input-group"><label>Teslim Eden</label><select id="newStartBy" class="staff-dropdown"></select></div>
            <div class="input-group"><label>Teslim Alan</label><select id="newDeliveredTo" class="staff-dropdown"></select></div>
            <div class="input-group"><label>Başlangıç</label><input type="text" id="newStartPoint" placeholder="Nokta..."></div>
            <div class="input-group"><label>Bitiş</label><input type="text" id="newEndPoint" placeholder="Nokta..."></div>
            <div class="input-group"><label>Zaman</label><input type="datetime-local" id="newTime"></div>
            <button class="btn-add" onclick="window.master.createLog()">KAYIT AÇ</button>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="searchBar" placeholder="Ara..." style="flex:1;">
        </div>

        <div id="logList"></div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, push, remove } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

    // MERKEZ CONFIG (Sabit)
    const merkezConfig = {
        apiKey: "AIzaSyAM5NHBpRHIlttNXwJ9YKDypR4eoyQbDeM",
        authDomain: "kolartguvenlik-e002d.firebaseapp.com",
        databaseURL: "https://kolartguvenlik-e002d-default-rtdb.firebaseio.com",
        projectId: "kolartguvenlik-e002d"
    };

    class Commander {
        constructor() {
            this.merkezApp = initializeApp(merkezConfig, "merkez_hub");
            this.db = null; // Site veritabanı buraya atanacak
            this.logs = {};
            this.init();
        }

        async init() {
            // sessionStorage'dan site ID al
            const sId = sessionStorage.getItem("selectedSite") || sessionStorage.getItem("selectedSiteId");
            
            if(!sId) {
                alert("Site seçimi bulunamadı! Lütfen ana panelden seçim yapın.");
                return;
            }

            try {
                // 1. Merkezden site config'ini çek
                const mDb = getDatabase(this.merkezApp);
                const siteSnap = await get(ref(mDb, `sites/${sId}/config`));
                
                if (!siteSnap.exists()) {
                    alert("Site yapılandırması bulunamadı!");
                    return;
                }

                // 2. Dinamik site bağlantısını kur
                const siteConfig = siteSnap.val();
                const siteApp = initializeApp(siteConfig, sId);
                this.db = getDatabase(siteApp);

                document.getElementById('siteTag').innerText = sId.toUpperCase();
                
                // 3. Verileri dinlemeye başla
                this.loadUsers();
                this.listenLogs();
                
                // Saat ve tarih ayarları
                setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
                document.getElementById('newTime').value = new Date().toISOString().slice(0, 16);
                
                // Arama inputu için event ekle
                document.getElementById('searchBar').oninput = () => this.render();

            } catch (err) {
                console.error("Bağlantı Hatası:", err);
            }
        }

        loadUsers() {
            onValue(ref(this.db, 'users'), s => {
                const data = s.val() || {};
                const selects = document.querySelectorAll('.staff-dropdown');
                let opt = '<option value="">Seç...</option>';
                Object.values(data).filter(u => u.type === 'security').forEach(u => {
                    const name = u.username || u.name;
                    opt += `<option value="${name}">${name}</option>`;
                });
                selects.forEach(s => s.innerHTML = opt);
            });
        }

        listenLogs() {
            onValue(ref(this.db, 'tamamnbt'), s => {
                this.logs = s.val() || {};
                this.render();
            });
        }

        render() {
            const container = document.getElementById('logList');
            const term = document.getElementById('searchBar').value.toLowerCase();
            container.innerHTML = '';
            
            const items = Object.entries(this.logs).sort((a,b) => new Date(b[1].startTime) - new Date(a[1].startTime));
            document.getElementById('totalCount').innerText = items.length;

            items.forEach(([id, log]) => {
                if(term && !JSON.stringify(log).toLowerCase().includes(term)) return;

                let currentStatus = log.status;
                if (!currentStatus || currentStatus === "") {
                    currentStatus = (log.startPoint === log.endPoint) ? "Güvenli" : "Uyuşmazlık";
                }

                const isSafe = currentStatus === "Güvenli";
                const card = document.createElement('div');
                card.className = 'log-card';
                card.innerHTML = `
                    <div class="input-group">
                        <label>ZAMAN</label>
                        <input type="datetime-local" value="${this.toInput(log.startTime)}" onchange="window.master.updateLog('${id}', 'startTime', this.value)">
                    </div>
                    <div class="input-group">
                        <label>OPERASYON</label>
                        <div style="font-weight:700; font-size:13px; color:var(--accent)">${log.startBy} ➔ ${log.deliveredTo || '...'}</div>
                    </div>
                    <div class="input-group">
                        <label>KONUM AKIŞI</label>
                        <div style="display:flex; gap:5px;">
                            <input type="text" value="${log.startPoint || ''}" onchange="window.master.updateLog('${id}', 'startPoint', this.value)">
                            <input type="text" value="${log.endPoint || ''}" onchange="window.master.updateLog('${id}', 'endPoint', this.value)">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>DURUM ANALİZİ</label>
                        <select class="status-select ${isSafe ? 'status-safe' : 'status-alert'}" onchange="window.master.updateLog('${id}', 'status', this.value)">
                            <option value="Güvenli" ${isSafe ? 'selected' : ''}>GÜVENLİ</option>
                            <option value="Uyuşmazlık" ${!isSafe ? 'selected' : ''}>UYUŞMAZLIK</option>
                        </select>
                    </div>
                    <button onclick="window.master.deleteLog('${id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:900;">×</button>
                `;
                container.appendChild(card);
            });
        }

        async createLog() {
            const data = {
                startBy: document.getElementById('newStartBy').value,
                deliveredTo: document.getElementById('newDeliveredTo').value,
                startPoint: document.getElementById('newStartPoint').value,
                endPoint: document.getElementById('newEndPoint').value,
                startTime: document.getElementById('newTime').value.replace('T', ' '),
                status: "" 
            };
            if(!data.startBy) return alert("Personel seç!");
            await push(ref(this.db, 'tamamnbt'), data);
            this.showToast();
        }

        async updateLog(id, field, val) {
            let value = val;
            if(field === 'startTime') value = val.replace('T', ' ');
            await update(ref(this.db, `tamamnbt/${id}`), { [field]: value });
            this.showToast();
        }

        async deleteLog(id) {
            if(confirm("Silinsin mi?")) await remove(ref(this.db, `tamamnbt/${id}`));
        }

        toInput(str) { return str ? str.replace(' ', 'T').slice(0, 16) : ''; }
        showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 1500);
        }
    }

    // Global erişim için window'a bağladık
    window.master = new Commander();
</script>
</body>
</html>
