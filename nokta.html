<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Nöbet Noktaları & QR Kodlar</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Montserrat', sans-serif; background:#2c3e50; color:#ecf0f1; }
.container { max-width:800px; margin:20px auto; padding:20px; background: rgba(0,0,0,0.3); border-radius:12px; }
h1 { text-align:center; margin-bottom:20px; }
input, button { padding:10px; margin:5px 0; border-radius:8px; border:none; font-size:16px; }
button { cursor:pointer; font-weight:600; transition:0.3s; }
button:hover { opacity:0.9; }
#qrList div { margin:10px 0; padding:10px; background: rgba(255,255,255,0.1); border-radius:8px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; }
.qrCodeImg { width:300px; height:300px; border:1px solid #fff; border-radius:8px; display:flex; align-items:center; justify-content:center; }

/* Çıkış butonu sağ üst köşe */
#logoutBtn {
  position:fixed;
  top:20px;
  right:20px;
  background:#e74c3c;
  color:#fff;
  padding:12px 20px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
  z-index:1000;
  transition:0.3s;
}
#logoutBtn:hover { opacity:0.9; }
</style>
</head>
<body>

<!-- Çıkış Butonu -->
<button id="logoutBtn">Çıkış</button>

<div class="container">
  <h1>Admin Panel - Nöbet Noktaları & QR Kodlar</h1>

  <label>Nöbet Noktası Adı:</label>
  <input type="text" id="pointName" placeholder="Örn: Arka Bahçe">
  <button id="generateQRBtn" style="background:#27ae60; color:#fff;">QR Kod Oluştur & Kaydet</button>
  
  <h2>Oluşturulan QR Kodlar</h2>
  <div id="qrList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

async function initPage(){

  // 🔹 Seçilen siteyi ana panelden al
  const selectedSiteId = sessionStorage.getItem("selectedSite");
  if(!selectedSiteId){
    alert("Lütfen ana panelden bir site seçin!");
    window.location.href = "index.html";
    return;
  }

  // 🔹 Merkez DB başlat
  const merkezConfig = {
       apiKey: "AIzaSyAM5NHBpRHIlttNXwJ9YKDypR4eoyQbDeM",
  authDomain: "kolartguvenlik-e002d.firebaseapp.com",
  databaseURL: "https://kolartguvenlik-e002d-default-rtdb.firebaseio.com",
  projectId: "kolartguvenlik-e002d",
  storageBucket: "kolartguvenlik-e002d.firebasestorage.app",
  messagingSenderId: "212955174898",
  appId: "1:212955174898:web:f77501991c1648fb66bd6b",
  measurementId: "G-TCGDNDYY6Y"
  };
  const merkezApp = initializeApp(merkezConfig, "merkez");
  const merkezDb = getDatabase(merkezApp);

  // 🔹 Site config’i merkezden al
  const siteConfigSnap = await get(ref(merkezDb, "sites/" + selectedSiteId + "/config"));
  if(!siteConfigSnap.exists()){
    alert("Site config bulunamadı!");
    window.location.href = "index.html";
    return;
  }
  const siteConfig = siteConfigSnap.val();

  // 🔹 Site DB başlat
  const siteApp = initializeApp(siteConfig, selectedSiteId);
  const db = getDatabase(siteApp);

  // DOM
  const pointName = document.getElementById('pointName');
  const generateQRBtn = document.getElementById('generateQRBtn');
  const qrList = document.getElementById('qrList');
  const logoutBtn = document.getElementById('logoutBtn');

  // Çıkış butonu yönlendirme
  logoutBtn.addEventListener('click', ()=> {
    window.location.href = 'mod.html';
  });

  // QR kütüphanesi yükle
  const QR_SCRIPT = document.createElement('script');
  QR_SCRIPT.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
  document.body.appendChild(QR_SCRIPT);
  await new Promise(resolve => QR_SCRIPT.onload = resolve); // 🔹 QR script yüklensin

  // Güvenli QR ID oluştur: ASCII safe Base64
  function createSafeQRId(name){
    const utf8Name = unescape(encodeURIComponent(name));
    const base64 = btoa(utf8Name);
    return base64 + '_' + Date.now();
  }

  // QR kod oluştur ve Firebase kaydet
  generateQRBtn.addEventListener('click', async () => {
    generateQRBtn.disabled = true;
    const name = pointName.value.trim();
    if (!name) { alert("Nöbet noktası adını girin!"); generateQRBtn.disabled=false; return; }

    const qrId = createSafeQRId(name);
    const qrData = { name, qrId, timestamp: serverTimestamp() };
    await set(ref(db,'qrNoktas/'+qrId), qrData);

    pointName.value='';
    generateQRBtn.disabled = false;
  });

  // QR kodları yükle ve listele
  onValue(ref(db,'qrNoktas'), snapshot => {
    qrList.innerHTML = '';
    const data = snapshot.val();
    if(data){
      Object.values(data).forEach(addQRToList);
    }
  });

  // Listeye ekleme
  function addQRToList(qrData){
    const div = document.createElement('div');
    div.style.display='flex'; div.style.alignItems='center'; div.style.gap='10px'; div.style.flexWrap='wrap'; div.style.margin='10px 0'; div.style.padding='10px'; div.style.background='rgba(255,255,255,0.1)'; div.style.borderRadius='8px';

    const qrDiv = document.createElement('div');
    qrDiv.classList.add('qrCodeImg');
    new QRCode(qrDiv, { text: qrData.qrId, width:300, height:300, correctLevel:QRCode.CorrectLevel.H });

    const infoDiv = document.createElement('div');
    infoDiv.innerHTML=`<strong>${qrData.name}</strong><br>ID: ${qrData.qrId}`;

    const downloadBtn = document.createElement('button');
    downloadBtn.textContent='İndir';
    downloadBtn.style.background='#2980b9'; downloadBtn.style.color='#fff';
   downloadBtn.addEventListener('click', () => {
    const originalCanvas = qrDiv.querySelector('canvas');
    if (originalCanvas) {
        // 1. Yeni bir geçici canvas oluştur (QR + Alt Bilgi alanı için biraz daha yüksek)
        const tempCanvas = document.createElement('canvas');
        const ctx = tempCanvas.getContext('2d');
        const padding = 40; // Yazı için alt kısma eklenecek boşluk
        
        tempCanvas.width = originalCanvas.width;
        tempCanvas.height = originalCanvas.height + padding;

        // 2. Arka planı beyaz yap (PNG şeffaf gelmesin diye)
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

        // 3. QR kodu en üste çiz
        ctx.drawImage(originalCanvas, 0, 0);

        // 4. Yazı stilini ayarla ve ismi alta yaz
        ctx.fillStyle = "#000000"; // Siyah yazı
        ctx.font = "bold 18px Montserrat, Arial";
        ctx.textAlign = "center";
        
        // Yazıyı QR'ın altına ortala
        ctx.fillText(qrData.name, tempCanvas.width / 2, originalCanvas.height + 25);

        // 5. Birleştirilmiş resmi indir
        const url = tempCanvas.toDataURL("image/png");
        const a = document.createElement('a');
        a.href = url;
        a.download = `QR_${qrData.name}.png`;
        a.click();
    }
});

    const deleteBtn = document.createElement('button');
    deleteBtn.textContent='Sil';
    deleteBtn.style.background='#c0392b'; deleteBtn.style.color='#fff';
    deleteBtn.addEventListener('click', async ()=>{
      if(confirm(`"${qrData.name}" QR kodunu silmek istediğinize emin misiniz?`)){
        await remove(ref(db,'qrNoktas/'+qrData.qrId));
      }
    });

    div.appendChild(qrDiv);
    div.appendChild(infoDiv);
    div.appendChild(downloadBtn);
    div.appendChild(deleteBtn);
    qrList.appendChild(div);
  }

}

// Sayfa açıldığında başlat
initPage();

</script>
</body>
</html>
