<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Kullanım</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.panel{
width:520px;
background:#1b1b1b;
padding:30px;
border-radius:14px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.row{
margin-bottom:28px;
}

.label{
font-size:18px;
margin-bottom:8px;
opacity:.9;
}

.usage{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.bar{
width:100%;
height:16px;
background:#333;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#5aa2ff;
border-radius:20px;
transition:1s;
}

.small{
opacity:.7;
margin-top:6px;
}

</style>
</head>

<body>

<div class="panel">

<div class="row">
<div class="label">Depolamak</div>
<div id="storageText" class="usage">Hesaplanıyor...</div>
<div class="bar"><div id="storageBar" class="fill"></div></div>
<div class="small">Toplam 1 GB</div>
</div>

<div class="row">
<div class="label">İndirmeler</div>
<div id="downloadText" class="usage">Hesaplanıyor...</div>
<div class="bar"><div id="downloadBar" class="fill"></div></div>
<div class="small">Limit 10 GB / ay</div>
</div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import { getDatabase, ref, get }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";


/* MERKEZ CONFIG */
const merkezConfig={
apiKey:"AIzaSyAM5NHBpRHIlttNXwJ9YKDypR4eoyQbDeM",
authDomain:"kolartguvenlik-e002d.firebaseapp.com",
databaseURL:"https://kolartguvenlik-e002d-default-rtdb.firebaseio.com",
projectId:"kolartguvenlik-e002d",
storageBucket:"kolartguvenlik-e002d.firebasestorage.app",
messagingSenderId:"212955174898",
appId:"1:212955174898:web:f77501991c1648fb66bd6b"
};

const merkezApp=initializeApp(merkezConfig,"merkez");
const merkezDb=getDatabase(merkezApp);


/* SEÇİLEN SİTE */
const selectedSiteId=sessionStorage.getItem("selectedSite");

if(!selectedSiteId){
alert("Site seçilmedi");
throw "site yok";
}


/* CONFIG AL */
const snap=await get(ref(merkezDb,"sites/"+selectedSiteId+"/config"));
const siteConfig=snap.val();


/* SITE DB */
const siteApp=initializeApp(siteConfig,selectedSiteId);
const db=getDatabase(siteApp);


/* LIMITLER */
const STORAGE_LIMIT_MB=1024;      // 1GB
const DOWNLOAD_LIMIT_MB=10240;    // 10GB


async function calculate(){

const snapshot=await get(ref(db,"/"));

const val=snapshot.val();

if(!val)return;

const json=JSON.stringify(val);

const bytes=new Blob([json]).size;

const mb=bytes/(1024*1024);


/* STORAGE */
const storagePercent=(mb/STORAGE_LIMIT_MB)*100;

document.getElementById("storageBar").style.width=storagePercent+"%";

document.getElementById("storageText").innerHTML=
`Kullanılan ${mb.toFixed(2)} MB (%${storagePercent.toFixed(1)})`;


/* DOWNLOAD (yaklaşık hesap) */
const downloadMB=mb;  

const downloadPercent=(downloadMB/DOWNLOAD_LIMIT_MB)*100;

document.getElementById("downloadBar").style.width=downloadPercent+"%";

document.getElementById("downloadText").innerHTML=
`${downloadMB.toFixed(2)} MB (%${downloadPercent.toFixed(1)})`;

}


calculate();

setInterval(calculate,60000);

</script>

</body>
</html>
